    let currentQ = 0;
    let scores = { F: 0, H: 0, P: 0, G: 0, R: 0, T: 0, S: 0, E: 0 };

    function checkPassword() {
        const input = document.getElementById('password-input').value.trim();
        if (input === 'Kevin') {
            document.getElementById('password-gate').style.display = 'none';
            document.getElementById('quiz-box').style.display = 'flex';
            loadQuestion();
        } else {
            document.getElementById('gate-error').innerText = '口令错误，请重试';
            document.getElementById('password-input').value = '';
            document.getElementById('password-input').focus();
        }
    }

    function loadQuestion() {
        if (currentQ >= questions.length) {
            showResult();
            return;
        }
        document.getElementById('progress').innerText = `${currentQ + 1} / 20`;
        const qData = questions[currentQ];
        document.getElementById('question-text').innerText = qData.q;
        
        const optsBox = document.getElementById('options-container');
        optsBox.innerHTML = '';
        
        // 动态生成选项按钮（兼容2个或4个选项）
        qData.options.forEach((opt) => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = opt.text;
            btn.onclick = () => {
                scores[opt.val]++;
                currentQ++;
                loadQuestion();
            };
            optsBox.appendChild(btn);
        });
    }

    function showResult() {
        document.getElementById('quiz-box').style.display = 'none';
        document.getElementById('result-box').style.display = 'block';

        const dim1 = scores.F >= scores.H ? 'F' : 'H';
        const dim2 = scores.P >= scores.G ? 'P' : 'G';
        const dim3 = scores.R >= scores.T ? 'R' : 'T';
        const dim4 = scores.S >= scores.E ? 'S' : 'E';
        const finalCode = dim1 + dim2 + dim3 + dim4;

        const resultData = results[finalCode];

        document.getElementById('res-code').innerText = `你的维度代码：${finalCode}`;
        document.getElementById('res-type').innerText = resultData.name;
        document.getElementById('res-desc').innerText = resultData.desc;
    }
